# Allgemeine Bezeichnungen und RavenDB-Sammlungen dieses Bereichs.
config:
  key: adressen
  singular: Adresse
  plural: Adressen
  collection_name: Adressen
  settings_collection_name: AdresslistenEinstellungen
  model_name: Adresse
  legacy_name_fields: [vorname, nachname]

# Felddefinitionen für Formular, Suche, Sortierung und Kartenliste.
field_labels:
