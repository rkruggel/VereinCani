# Allgemeine Bezeichnungen und RavenDB-Sammlungen dieses Bereichs.
config:
  key: adressen
  singular: Adresse
  plural: Adressen
  collection_name: Adressen
  settings_collection_name: AdresslistenEinstellungen
  model_name: Adresse
  legacy_name_fields: [vorname, nachname]

# Felddefinitionen für Formular, Suche, Sortierung und Kartenliste.
field_labels:
  id:
    type: string          
    # Der Feldtyp, 
    # z.B. string, email, datum, etc.
    text: ID              
    # Die Bezeichnung, die im Formular und in der Liste angezeigt wird.
    steuerelement: label  
    # Das Steuerelement
    # z.B. input, select, textarea, label, etc.
    formular: false     
    # Ob das Feld im Formular angezeigt wird (true/false).
    suchbar: true       
    # Ob das Feld in der Suche verwendet werden kann (true/false).
    sortierbar: true    
    # Ob das Feld sortierbar ist (true/false).
    pos:
      listSection: headerDetail 
      # Kartenbereich: headerDetail, primary, secondary, status oder off.
      listPos: 10         
      # Die Position innerhalb der Sektion in der Kartenliste 
      # (niedrigere Zahlen erscheinen zuerst).
    listValueClasses: text-xs text-slate-500  
    # Zusätzliche CSS-Klassen für die Anzeige des Feldwerts in der Kartenliste.

  anrede:
    type: string
    text: Anrede
    steuerelement: select
    formular: true
    optionen: [Herr, Frau, Diverse]
    suchbar: true
    sortierbar: true
    pos:
      formHeaderPos: 10
      listSection: off
      listPos: 30
    listValueClasses: text-sm text-slate-500

  titel:
    type: string
    text: Titel
    steuerelement: select
    formular: true
    optionen: [Dr., Prof., Prof. Dr.]
    suchbar: true
    sortierbar: true
    pos:
      formHeaderPos: 20
      listSection: headerDetail
      listPos: 40
    listValueClasses: text-sm text-slate-500

  vorname:
    type: string
    text: Vorname
    steuerelement: input
    formular: true
    pflichtfeld: true
    suchbar: true
    sortierbar: true
    pos:
      formHeaderPos: 30
      listSection: off
      listPos: 50
    listValueClasses: text-sm text-slate-500

  nachname:
    type: string
    text: Nachname
    steuerelement: input
    formular: true
    pflichtfeld: true
    suchbar: true
    sortierbar: true
    pos:
      formHeaderPos: 40
