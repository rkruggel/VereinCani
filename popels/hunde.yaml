# Allgemeine Bezeichnungen und RavenDB-Sammlungen dieses Bereichs.
config:
  key: hunde
  singular: Hund
  plural: Hunde
  collection_name: Hunde
  settings_collection_name: HundelistenEinstellungen
  model_name: Hund

# -- aus notion übernommen, aber noch nicht angepasst:
# Key, AlterJahre, AlterMonate, Anamnese, Angst beschreiben, Chip Nummer,
# Erstkontakt, Foto Erstkontakt, FotoAktuell, Gewicht, GewichtOk, GewichtSoll,
# Gruppe, Haftpflicht, Hundename, Ich versichere, Ist ein Angsthund, 
# KastrAlter Jahr, KastrAlter Monat, Kastriert, Mix aus, Mix-Rasse, Rasse,
# Rufname, Schulterhöhe, Ursprung, Verträglich mit Hunden, Verträglich mit Menschen,
# diff, geboren, geimpft, geschlecht, wann kastriert

# Felddefinitionen für Formular, Suche, Sortierung und Kartenliste.
field_labels:
