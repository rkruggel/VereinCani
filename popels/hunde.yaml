# Allgemeine Bezeichnungen und CouchDB-Dokumenttypen dieses Bereichs.
config:
  key: hunde
  singular: Hund
  plural: Hunde
  collection_name: Hunde
  settings_collection_name: HundelistenEinstellungen
  model_name: Hund

# -- aus notion übernommen, aber noch nicht angepasst:
# Key, AlterJahre, AlterMonate, Anamnese, Angst beschreiben, Chip Nummer,
# Erstkontakt, Foto Erstkontakt, FotoAktuell, Gewicht, GewichtOk, GewichtSoll,
# Gruppe, Haftpflicht, Hundename, Ich versichere, Ist ein Angsthund, 
# KastrAlter Jahr, KastrAlter Monat, Kastriert, Mix aus, Mix-Rasse, Rasse,
# Rufname, Schulterhöhe, Ursprung, Verträglich mit Hunden, Verträglich mit Menschen,
# diff, geboren, geimpft, geschlecht, wann kastriert

# Felddefinitionen für Formular, Suche, Sortierung und Kartenliste.
field_labels:
  id:
    type: string
    text: ID
    page:
      steuerelement: label
      formular: false
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: headerDetail
      listPos: 10
      listValueClasses: text-xs text-slate-500

  hundename:
    type: string
    text: Hundename
    beschreibung: Offizieller Name des Hundes. Dieser Name wird als wichtigste Bezeichnung in Listen und Verknüpfungen genutzt.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
      pflichtfeld: true
    liste:
      suchbar: true
      sortierbar: true
      formHeaderPos: 10
      listSection: headerDetail
      listPos: 360
      listValueClasses: text-sm text-slate-500

  rufname:
    type: string
    text: Rufname
    beschreibung: Name, auf den der Hund im Alltag hört, falls er vom offiziellen Namen abweicht.
    page:
      steuerelement: input
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: headerDetail
      listPos: 450
      listValueClasses: text-sm text-slate-500

# 

  rasseOderMix:
    type: string
    text: Rasse oder Mix
    beschreibung: Gibt an, ob der Hund als Rassehund oder Mischling geführt wird.
    page:
      steuerelement: select
      optionen: [Rasse, Mix]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 480
      listValueClasses: text-sm text-slate-500

  rasse:
    type: string
    text: Rasse
    beschreibung: Rasse des Hundes, wenn bekannt oder relevant.
    page:
      steuerelement: input
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 440
      listValueClasses: text-sm text-slate-500

  mixRasse:
    type: string
    text: Mix-Rasse
    beschreibung: Bekannte oder vermutete Rassenanteile bei einem Mischling.
    page:
      steuerelement: input
      formular: true
      horizont: 3
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'secondary'
      listPos: 430
      listValueClasses: text-sm text-slate-500
      
  ursprung:
    type: string
    text: Ursprung
    beschreibung: Herkunft des Hundes, zum Beispiel Züchter, Tierheim, privat oder sonstige Quelle.
    page:
      steuerelement: select
      optionen: [Züchter, Tierheim, Privat, Sonstiges]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 470
      listValueClasses: text-sm text-slate-500

  geschlecht:
    type: select
    text: Geschlecht
    beschreibung: Geschlecht des Hundes.
    page:
      steuerelement: select
      optionen: [Rüde, Hündin, Unbekannt]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'secondary'
      listPos: 530
      listValueClasses: text-sm text-slate-500

  geboren:
    type: datum
    text: Geboren
    beschreibung: Geburtsdatum des Hundes. Daraus wird das aktuelle Alter berechnet.
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 510
      listValueClasses: text-sm text-slate-500

  alter:
    type: string
    text: Alter Jahre
    beschreibung: Automatisch berechnetes Alter des Hundes anhand des Geburtsdatums.
    page:
      steuerelement: input
      formular: true
      horizont: 2
      gesperrt: true
      berechnen: datumDiff(geboren, today)
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 230
      listValueClasses: text-sm text-slate-500

  beimirseit:
    type: datum
    text: bei mir seit
    beschreibung: Datum, seit dem der Hund bei der aktuellen Bezugsperson lebt.
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 510
      listValueClasses: text-sm text-slate-500

  beimirAlter:
    type: string
    text: Alter Jahre
    beschreibung: Automatisch berechnete Dauer, seit der Hund bei der aktuellen Bezugsperson lebt.
    page:
      steuerelement: input
      formular: true
      horizont: 2
      gesperrt: true
      berechnen: datumDiff(beimirseit, today)
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 230
      listValueClasses: text-sm text-slate-500

  kastriert:
    type: string
    text: Kastriert
    beschreibung: Gibt an, ob der Hund kastriert ist oder ob die Information unsicher ist.
    page:
      steuerelement: select
      optionen: [Ja, Nein, Unsicher]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 410
      listValueClasses: text-sm text-slate-500

  kastrAlter:
    type: string
    text: Kastriert Alter
    beschreibung: Alter des Hundes zum Zeitpunkt der Kastration, falls bekannt.
    page:
      steuerelement: input
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 400
      listValueClasses: text-sm text-slate-500

  wannKastriert:
    type: datum
    text: Wann kastriert
    beschreibung: Datum der Kastration, falls bekannt.
    page:
      steuerelement: date
      formular: true
      horizont: 3
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 540
      listValueClasses: text-sm text-slate-500

  chipNummer:
    type: string
    text: Chip Nummer
    beschreibung: Mikrochip-Nummer zur eindeutigen Identifikation des Hundes.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 270
      listValueClasses: text-sm text-slate-500

  geimpft:
    type: string
    text: Geimpft
    beschreibung: Gibt an, ob der Hund aktuell als geimpft geführt wird.
    page:
      steuerelement: select
      optionen: [Ja, Nein]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 520
      listValueClasses: text-sm text-slate-500

  besitzer:
    type: string
    text: Besitzer
    beschreibung: Zugeordnete Person, die als Besitzer oder Hauptkontakt für den Hund geführt wird.
    page:
      steuerelement: select
      optionen: []
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 20
      listValueClasses: text-sm text-slate-500

  anamnese:
    type: string
    text: Anamnese
    beschreibung: Kurzer medizinischer oder verhaltensbezogener Hintergrund des Hundes.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 250
      listValueClasses: text-sm text-slate-500

  erstkontakt:
    type: datum
    text: Erstkontakt
    beschreibung: Datum des ersten Kontakts zum Hund oder zur Bezugsperson.
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 280
      listValueClasses: text-sm text-slate-500

  gewicht:
    type: int
    text: Gewicht
    beschreibung: Aktuelles Gewicht des Hundes.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 310
      listValueClasses: text-sm text-slate-500

  gewichtSoll:
    type: string
    text: Gewicht Soll
    beschreibung: Ziel- oder Idealgewicht des Hundes.
    page:
      steuerelement: input
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 330
      listValueClasses: text-sm text-slate-500

  diff:
    type: int
    text: Diff
    beschreibung: Automatisch berechnete Differenz zwischen Sollgewicht und aktuellem Gewicht.
    page:
      steuerelement: input
      formular: true
      horizont: 3
      gesperrt: true
      berechnen: intDiff(gewichtSoll, gewicht)
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 500
      listValueClasses: text-sm text-slate-500

  gewichtOk:
    type: string
    text: Gewicht Ok
    beschreibung: Automatisch berechnete Einschätzung, ob das aktuelle Gewicht zum Sollgewicht passt.
    page:
      steuerelement: input
      formular: true
      horizont: 4
      gesperrt: true
      berechnen: gewichtOk(gewichtSoll, gewicht)
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 320
      listValueClasses: text-sm text-slate-500

  schulterhoehe:
    type: int
    text: Schulterhöhe in cm
    beschreibung: Schulterhöhe des Hundes in Zentimetern.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 460
      listValueClasses: text-sm text-slate-500

  vertraeglichMitHunden:
    type: string
    text: Verträglich mit Hunden
    beschreibung: Einschätzung, wie verträglich der Hund mit anderen Hunden ist.
    page:
      steuerelement: select
      optionen: [Ja, Nein, Nach Eingewöhnung, Unsicher]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 480
      listValueClasses: text-sm text-slate-500

  vertraeglichMitMenschen:
    type: string
    text: Verträglich mit Menschen
    beschreibung: Einschätzung, wie verträglich der Hund mit Menschen ist.
    page:
      steuerelement: select
      optionen: [Ja, Nein, Nach Eingewöhnung, Unsicher]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 490
      listValueClasses: text-sm text-slate-500

  istEinAngsthund:
    type: string
    text: Ist ein Angsthund
    beschreibung: Gibt an, ob der Hund als Angsthund eingeschätzt wird oder ob dies unsicher ist.
    page:
      steuerelement: select
      optionen: [Ja, Nein, Unsicher]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 380
      listValueClasses: text-sm text-slate-500

  angstBeschreiben:
    type: string
    text: Angst beschreiben
    beschreibung: Beschreibung der Ängste, Auslöser oder Situationen, die beim Hund besondere Vorsicht erfordern.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 260
      listValueClasses: text-sm text-slate-500

  istVersichert:
    type: string
    text: Ist versichert
    beschreibung: Gibt an, ob für den Hund eine Haftpflichtversicherung vorliegt.
    page:
      steuerelement: select
      optionen: [Ja, Nein]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 350
      listValueClasses: text-sm text-slate-500

  derVersicherer:
    type: string
    text: Der Versicherer
    beschreibung: Name der Versicherungsgesellschaft oder des Versicherers.
    page:
      steuerelement: input
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 350
      listValueClasses: text-sm text-slate-500

  haftpflichtSeit:
    type: datum
    text: Haftpflicht seit
    beschreibung: Datum, seit dem die Haftpflichtversicherung besteht.
    page:
      steuerelement: date
      formular: true
      horizont: 3
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: 'off'
      listPos: 350
      listValueClasses: text-sm text-slate-500

  text:
    type: string
