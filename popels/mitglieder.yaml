# Felddefinitionen für Formular, Suche, Sortierung und Kartenliste.
# listSection: "off" blendet die Detailanzeige aus; formHeaderPos bleibt wirksam.
field_labels:
  id:
    type: string
    text: ID
    steuerelement: label
    formular: false
    horizont: 1
    gesperrt: false
    suchbar: true
    sortierbar: true
    pos:
      listSection: headerDetail
      listPos: 20
    listValueClasses: text-xs text-slate-500

  vorname:
    type: string
    text: Vorname
    steuerelement: input
    formular: true
    horizont: 1
    gesperrt: false
    pflichtfeld: true
    suchbar: true
    sortierbar: true
    pos:
      formHeaderPos: 30
      listSection: headerDetail
      listPos: 30
    listValueClasses: text-sm text-slate-500

  nachname:
    type: string
    text: Nachname
    steuerelement: input
    formular: true
    horizont: 1
    gesperrt: false
    pflichtfeld: true
    suchbar: true
    sortierbar: true
    pos:
      formHeaderPos: 40
      listSection: headerDetail
      listPos: 40
    listValueClasses: text-sm text-slate-500

  status:
    type: string
    text: Mitgliedsstatus
    steuerelement: select
    formular: true
    horizont: 1
    gesperrt: false
    optionen: [Aktiv, Passiv, Ehemalig]
    suchbar: true
    sortierbar: true
    pos:
      listSection: primary
      listPos: 5
    listValueClasses: text-sm text-slate-500

  MitgliedSeit:
    type: datum
    text: MitgliedSeit
    steuerelement: date
    formular: true
    horizont: 1
    gesperrt: false
    suchbar: true
    sortierbar: true
    pos:
      listSection: secondary
      listPos: 5
    listValueClasses: text-sm text-slate-500

  hunde:
    type: liste
    text: Hunde
    steuerelement: input_chips
    formular: true
    horizont: 1
    gesperrt: false
    suchbar: false
    sortierbar: false
    pos:
      listSection: "off"
      listPos: 270

  persoenlich:
