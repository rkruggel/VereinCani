# Allgemeine Bezeichnungen und CouchDB-Dokumenttypen dieses Bereichs.
config:
  key: mitglieder
  singular: Mitglied
  plural: Mitglieder
  collection_name: Mitglieder
  settings_collection_name: MitgliederlistenEinstellungen
  model_name: Mitglied

