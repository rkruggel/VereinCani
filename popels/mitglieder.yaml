# Felddefinitionen für Formular, Suche, Sortierung und Kartenliste.
# listSection: "off" blendet die Detailanzeige aus; formHeaderPos bleibt wirksam.
field_labels:
  id:
    type: string
    text: ID
    page:
      steuerelement: label
      formular: false
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: headerDetail
      listPos: 10
      listValueClasses: text-xs text-slate-500

  name:
    type: string
    text: Name
    beschreibung: Anzeigename des Mitglieds in der Mitgliederliste. Dieser Name dient als schnelle Orientierung und sollte eindeutig sein.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
      pflichtfeld: true
    liste:
      suchbar: true
      sortierbar: true
      formHeaderPos: 30
      listSection: off
      listPos: 20
      listValueClasses: text-sm text-slate-500

  status:
    type: string
    text: Mitgliedsstatus
    beschreibung: Aktueller Status der Mitgliedschaft. Aktiv und Passiv bleiben im Bestand, Ehemalig kennzeichnet nicht mehr aktive Mitglieder.
    page:
      steuerelement: select
      optionen: [Aktiv, Passiv, Ehemalig]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 30
      listValueClasses: text-sm text-slate-500

  erstkontakt:
    type: datum
    text: Erstkontakt
    beschreibung: Datum des ersten Kontakts mit der Person oder dem Haushalt, zum Beispiel Anfrage, Kennenlernen oder Probetraining.
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'off'
      listPos: 40
      listValueClasses: text-sm text-slate-500

  mitgliedSeit:
    type: datum
    text: Mitglied seit
    beschreibung: Datum, ab dem die Mitgliedschaft offiziell beginnt oder begonnen hat.
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 50
      listValueClasses: text-sm text-slate-500

  artMitglied:
    type: string
    text: Art des Mitglieds
    beschreibung: Fachliche Einordnung des Kontakts, zum Beispiel Mitglied, Interessent, Vorstand, Sponsor oder ausgetreten.
    page:
      steuerelement: select
      optionen: [Mitglied, Interessent, Gast, Vorstand, Lieferant, Presse, Öffentlichkeit, Einzelarbeit, Fördermitglied, Sponsor, Ausgetreten ]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'secondary'
      listPos: 60
      listValueClasses: text-sm text-slate-500

  typ:
    type: string
    text: Typ
    beschreibung: Beitrags- und Verwaltungsart des Datensatzes. Haushalt kann mehrere Personen oder Hunde bündeln, Person steht für ein Einzelmitglied.
    page:
      steuerelement: select
      optionen: [Haushalt, Person, Fördermitglied, Sponsor]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'secondary'
      listPos: 70
      listValueClasses: text-sm text-slate-500

  persoenlich:
    type: liste
    text: Persönlich
    beschreibung: Verknüpfte persönliche Datensätze zu diesem Mitglied. Ein Klick auf einen Chip öffnet den zugehörigen Persönlich-Datensatz.
    page:
      steuerelement: input_chips
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: false
      listSection: 'off'
      listPos: 80
      listValueClasses: text-sm text-slate-500

  hunde:
    type: liste
    text: Hunde
    beschreibung: Hunde, die diesem Mitglied zugeordnet sind. Die Anzahl der Hunde kann für die Beitragsberechnung verwendet werden.
    page:
      steuerelement: input_chips
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: false
      listSection: 'off'
      listPos: 90
      listValueClasses: text-sm text-slate-500

  preis:
    type: string
    text: Preis
    beschreibung: Automatisch berechneter Mitgliedspreis anhand der zugeordneten Hunde und des Preisstamms. Das Feld wird nicht manuell bearbeitet.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: true
      berechnen: preisNachHunden(hunde)
    liste:
      suchbar: false
      sortierbar: false
      listSection: 'secondary'
      listPos: 100
      listValueClasses: text-sm text-slate-500

  unterlagenAusgehaendigt:
    type: datum
    text: Unterlagen ausgehändigt
    beschreibung: Datum, an dem die Mitgliedsunterlagen an das Mitglied ausgegeben oder versendet wurden.
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'secondary'
      listPos: 110
      listValueClasses: text-sm text-slate-500

  unterlagenZurueck:
    type: datum
    text: Unterlagen zurück
    beschreibung: Datum, an dem die ausgefüllten Mitgliedsunterlagen zurückgegeben wurden.
    page:
      steuerelement: date
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'secondary'
      listPos: 120
      listValueClasses: text-sm text-slate-500

  sepaZurueck:
    type: datum
    text: SEPA zurück
    beschreibung: Datum, an dem das unterschriebene SEPA-Mandat zurückgegeben wurde.
    page:
      steuerelement: date
      formular: true
      horizont: 3
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'secondary'
      listPos: 130
      listValueClasses: text-sm text-slate-500

  text:
    type: string
    text: Text vorhanden
    page:
      steuerelement: editor
      formular: false
      horizont: 1
      gesperrt: false
      actionLabel: Text
      actionIcon: description
    liste:
      suchbar: true
      sortierbar: false
      listSection: status
      listPos: 140

  bilder:
    type: bilder
    text: Bilder vorhanden
    page:
      steuerelement: upload
      formular: false
      horizont: 1
      gesperrt: false
      actionLabel: Pic
      actionIcon: image
    liste:
      suchbar: false
      sortierbar: false
      listSection: status
      listPos: 150
