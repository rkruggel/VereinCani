# Allgemeine Bezeichnungen und RavenDB-Sammlungen dieses Bereichs.
config:
  key: mitglieder
  singular: Mitglied
  plural: Mitglieder
  collection_name: Mitglieder
  settings_collection_name: MitgliederlistenEinstellungen
  model_name: Mitglied
  legacy_name_fields: [vorname, nachname]

# Felddefinitionen für Formular, Suche, Sortierung und Kartenliste.
# listSection: off blendet ein Feld vollständig aus der Kartenliste aus.
field_labels:
  id:
    type: string
    text: ID
    steuerelement: label
    formular: false
    suchbar: true
    sortierbar: true
    pos:
      listSection: headerDetail
      listPos: 20
    listValueClasses: text-xs text-slate-500

  mitgliedsnummer:
    type: string
    text: Mitgliedsnummer
    steuerelement: input
    formular: true
    pflichtfeld: true
    suchbar: true
    sortierbar: true
    pos:
      listSection: headerDetail
      listPos: 10
    listValueClasses: text-xs text-slate-500

  vorname:
    type: string
    text: Vorname
    steuerelement: input
    formular: true
    pflichtfeld: true
    suchbar: true
    sortierbar: true
    pos:
      formHeaderPos: 30
      listSection: headerDetail
      listPos: 30
    listValueClasses: text-sm text-slate-500

  nachname:
    type: string
    text: Nachname
    steuerelement: input
    formular: true
    pflichtfeld: true
    suchbar: true
    sortierbar: true
    pos:
      formHeaderPos: 40
      listSection: headerDetail
      listPos: 40
    listValueClasses: text-sm text-slate-500

  status:
    type: string
    text: Mitgliedsstatus
    steuerelement: select
    formular: true
    optionen: [Aktiv, Passiv, Ehemalig]
    suchbar: true
    sortierbar: true
    pos:
      listSection: primary
      listPos: 5
      listValueClasses: text-sm text-slate-500

  eintritt:
    type: datum
    text: Eintritt
    steuerelement: date
    formular: true
    suchbar: true
    sortierbar: true
    pos:
      listSection: secondary
      listPos: 5
    listValueClasses: text-sm text-slate-500

  hunde:
    type: string
    text: Hunde
    steuerelement: input
    formular: true
    pflichtfeld: true
    suchbar: true
    sortierbar: true
    pos:
      formHeaderPos: 50
      listSection: primary
      listPos: 10
    listValueClasses: text-sm text-slate-500

  text:
    type: string
    text: Text vorhanden
    steuerelement: editor
    formular: false
    suchbar: true
    sortierbar: false
    pos:
      listSection: status
      listPos: 10
    actionLabel: Text
    actionIcon: description
