# Felddefinitionen für Formular, Suche, Sortierung und Kartenliste.
# listSection: "off" blendet die Detailanzeige aus; formHeaderPos bleibt wirksam.
field_labels:
  id:
    type: string
    text: ID
    page:
      steuerelement: label
      formular: false
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: headerDetail
      listPos: 20
      listValueClasses: text-xs text-slate-500

  vorname:
    type: string
    text: Vorname
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
      pflichtfeld: true
    liste:
      suchbar: true
      sortierbar: true
      formHeaderPos: 30
      listSection: headerDetail
      listPos: 30
      listValueClasses: text-sm text-slate-500

  nachname:
    type: string
    text: Nachname
