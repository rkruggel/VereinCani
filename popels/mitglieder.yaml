# Felddefinitionen für Formular, Suche, Sortierung und Kartenliste.
# listSection: "off" blendet die Detailanzeige aus; formHeaderPos bleibt wirksam.
field_labels:
  id:
    type: string
    text: ID
    page:
      steuerelement: label
      formular: false
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: headerDetail
      listPos: 10
      listValueClasses: text-xs text-slate-500

  name:
    type: string
    text: Name
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
      pflichtfeld: true
    liste:
      suchbar: true
      sortierbar: true
      formHeaderPos: 30
      listSection: off
      listPos: 20
      listValueClasses: text-sm text-slate-500

  status:
    type: string
    text: Mitgliedsstatus
    page:
      steuerelement: select
      optionen: [Aktiv, Passiv, Ehemalig]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 30
      listValueClasses: text-sm text-slate-500

  erstkontakt:
    type: datum
    text: Erstkontakt
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'off'
      listPos: 40
      listValueClasses: text-sm text-slate-500

  mitgliedSeit:
    type: datum
    text: Mitglied seit
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 50
      listValueClasses: text-sm text-slate-500

  artMitglied:
    type: string
    text: Art des Mitglieds
    page:
      steuerelement: select
      optionen: [Mitglied, Interessent, Gast, Vorstand, Lieferant, Presse, Öffentlichkeit, Einzelarbeit, Fördermitglied, Sponsor, Ausgetreten ]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'secondary'
      listPos: 60
      listValueClasses: text-sm text-slate-500

  typ:
    type: string
    text: Typ
    page:
      steuerelement: select
      optionen: [Haushalt, Person, Fördermitglied, Sponsor]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'secondary'
      listPos: 70
      listValueClasses: text-sm text-slate-500

  persoenlich:
    type: liste
    text: Persönlich
    page:
      steuerelement: input_chips
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: false
      listSection: 'off'
      listPos: 80
      listValueClasses: text-sm text-slate-500

  hunde:
    type: liste
    text: Hunde
    page:
      steuerelement: input_chips
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: false
      listSection: 'off'
      listPos: 90
      listValueClasses: text-sm text-slate-500

  preis:
    type: string
    text: Preis
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: true
      berechnen: preisNachHunden(hunde)
    liste:
      suchbar: false
      sortierbar: false
      listSection: 'secondary'
      listPos: 100
      listValueClasses: text-sm text-slate-500

  unterlagenAusgehaendigt:
    type: datum
    text: Unterlagen ausgehändigt
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'secondary'
      listPos: 110
      listValueClasses: text-sm text-slate-500

  unterlagenZurueck:
    type: datum
    text: Unterlagen zurück
    page:
      steuerelement: date
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'secondary'
      listPos: 120
      listValueClasses: text-sm text-slate-500

  sepaZurueck:
    type: datum
    text: SEPA zurück
    page:
      steuerelement: date
      formular: true
      horizont: 3
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'secondary'
      listPos: 130
      listValueClasses: text-sm text-slate-500

  text:
    type: string
    text: Text vorhanden
    page:
      steuerelement: editor
      formular: false
      horizont: 1
      gesperrt: false
      actionLabel: Text
      actionIcon: description
    liste:
      suchbar: true
      sortierbar: false
      listSection: status
      listPos: 140

  bilder:
    type: bilder
    text: Bilder vorhanden
    page:
      steuerelement: upload
      formular: false
      horizont: 1
      gesperrt: false
      actionLabel: Pic
      actionIcon: image
    liste:
      suchbar: false
      sortierbar: false
      listSection: status
      listPos: 150
