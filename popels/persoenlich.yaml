# Allgemeine Bezeichnungen und CouchDB-Dokumenttypen dieses Bereichs.
config:
  key: persoenlich
  singular: Persönlich
  plural: Persönlich
  collection_name: Persoenlich
  settings_collection_name: PersoenlichlistenEinstellungen
  model_name: Persoenlich

# Felddefinitionen für Formular, Suche, Sortierung und Kartenliste.
field_labels:
  id:
    type: string
    text: ID
    page:
      steuerelement: label
      formular: false
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: headerDetail
      listPos: 10
      listValueClasses: text-xs text-slate-500

  anrede:
    type: string
    text: Anrede
    beschreibung: Anrede der Person für Anschreiben und formale Kommunikation.
    page:
      steuerelement: select
      optionen: [Herr, Frau, Diverse]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      formHeaderPos: 10
      listSection: 'off'
      listPos: 30
      listValueClasses: text-sm text-slate-500

  titel:
    type: string
    text: Titel
    beschreibung: Akademischer oder beruflicher Titel, der zusammen mit dem Namen angezeigt werden soll.
    page:
      steuerelement: select
      optionen: [Dr., Prof., Prof. Dr.]
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      formHeaderPos: 20
      listSection: 'off'
      listPos: 40
      listValueClasses: text-sm text-slate-500

  name:
    type: string
    text: Name
    beschreibung: Vollständiger Name der Person. Dieses Feld ist die wichtigste Bezeichnung in Listen und Verknüpfungen.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
      pflichtfeld: true
    liste:
      suchbar: true
      sortierbar: true
      formHeaderPos: 30
      listSection: 'off'
      listPos: 50
      listValueClasses: text-sm text-slate-500

  zusatz:
    type: string
    text: Zusatz
    beschreibung: Zusätzliche Namens- oder Adressangaben, zum Beispiel Firma, c/o, Abteilung oder besondere Hinweise.
    page:
      steuerelement: textarea
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 10
      listValueClasses: text-sm text-slate-500

  adresse:
    type: string
    text: Adresse
    beschreibung: Straße, Hausnummer und weitere Adresszeilen der Person.
    page:
      steuerelement: textarea
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 15
      listValueClasses: text-sm text-slate-500

  ort:
    type: string
    text: Ort
    beschreibung: Postleitzahl und Wohnort beziehungsweise Zustellort.
    page:
      steuerelement: input
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 20
      listValueClasses: text-sm text-slate-500

  geboren:
    type: datum
    text: Geboren
    beschreibung: Geburtsdatum der Person, falls es für Vereinsverwaltung oder Auswertungen benötigt wird.
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 10
      listValueClasses: text-sm text-slate-500

  email:
    type: liste
    text: E-Mail
    beschreibung: Eine oder mehrere E-Mail-Adressen. Mehrere Einträge können als Liste gepflegt werden.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 30
      listValueClasses: text-sm text-slate-500

  www:
    type: liste
    text: www
    beschreibung: Webseiten oder Profile, die zur Person gehören.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 60
      listValueClasses: text-sm text-slate-500

  handy:
    type: liste
    text: Handy
    beschreibung: Eine oder mehrere Mobilnummern der Person.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 40
      listValueClasses: text-sm text-slate-500

  festnetz:
    type: liste
    text: Festnetz
    beschreibung: Eine oder mehrere Festnetznummern der Person.
    page:
      steuerelement: input
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 50
      listValueClasses: text-sm text-slate-500

  beruf:
    type: string
    text: Beruf
    beschreibung: Berufliche Tätigkeit oder Fachgebiet der Person.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 20
      listValueClasses: text-sm text-slate-500

  hobby:
    type: string
    text: Hobby
    beschreibung: Hobbys oder Interessen, die für den Verein hilfreich sein können.
    page:
      steuerelement: input
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 30
      listValueClasses: text-sm text-slate-500

  faehigkeiten:
    type: string
    text: Fähigkeiten
    beschreibung: Fähigkeiten, Kenntnisse oder Unterstützungsmöglichkeiten, die im Verein nützlich sein können.
    page:
      steuerelement: textarea
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 50
      listValueClasses: text-sm text-slate-500

  nichtWochentag:
    type: liste
    text: Nicht an Wochentagen
    beschreibung: Wochentage, an denen die Person normalerweise nicht verfügbar ist.
    page:
      steuerelement: multiselect
      optionen: [Montag, Dienstag, Mittwoch, Donnerstag, Freitag, Samstag, Sonntag]
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 40
      listValueClasses: text-sm text-slate-500

  verhalten:
    type: string
    text: Verhalten
    beschreibung: Kurzer Hinweis zum Auftreten, Umgang oder zu organisatorisch relevanten Besonderheiten.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 60
      listValueClasses: text-sm text-slate-500

  text:
    type: string
    text: Text vorhanden
    page:
      steuerelement: editor
      formular: false
      horizont: 1
      gesperrt: false
      actionLabel: Text
      actionIcon: description
    liste:
      suchbar: true
      sortierbar: false
      listSection: status
      listPos: 10

  bilder:
    type: bilder
    text: Bilder vorhanden
    page:
      steuerelement: upload
      formular: false
      horizont: 1
      gesperrt: false
      actionLabel: Pic
      actionIcon: image
    liste:
      suchbar: false
      sortierbar: false
      listSection: status
      listPos: 20
