# Allgemeine Bezeichnungen und CouchDB-Dokumenttypen dieses Bereichs.
config:
  key: preise
  singular: Preis
  plural: Preise
  collection_name: Preise
  settings_collection_name: PreislistenEinstellungen
  model_name: Preis

field_labels:
  id:
    type: string
    text: ID
    page:
      steuerelement: label
      formular: false
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: headerDetail
      listPos: 10
      listValueClasses: text-xs text-slate-500

  bezeichnung:
    type: string
    text: Bezeichnung
    beschreibung: Name oder kurze Bezeichnung des Preises, zum Beispiel Mitgliedsbeitrag oder Kursgebühr.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
      pflichtfeld: true
    liste:
      suchbar: true
      sortierbar: true
      formHeaderPos: 10
      listSection: headerDetail
      listPos: 20
      listValueClasses: text-base font-semibold text-slate-900

  mitglied:
    type: string
    text: Mitglied
    beschreibung: Mitglied, zu dem dieser Preis- oder Zahlungsdatensatz gehört.
    page:
      steuerelement: select
      optionen: []
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 30
      listValueClasses: text-sm text-slate-500

  betrag:
    type: string
    text: Betrag
    beschreibung: Geldbetrag des Preises. Bitte als Zahl mit optionalem Dezimaltrennzeichen eintragen.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
      pflichtfeld: true
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 10
      listValueClasses: text-sm text-slate-700

  intervall:
    type: string
    text: Intervall
    beschreibung: Zahlungsrhythmus oder Gültigkeitsintervall des Preises.
    page:
      steuerelement: select
      optionen: [Einmalig, Monatlich, Vierteljährlich, Halbjährlich, Jährlich]
      formular: true
      horizont: 2
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: primary
      listPos: 20
      listValueClasses: text-sm text-slate-700

  gueltigAb:
    type: datum
    text: Gültig ab
    beschreibung: Datum, ab dem dieser Preis verwendet werden soll.
    page:
      steuerelement: date
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: true
      listSection: secondary
      listPos: 10
      listValueClasses: text-sm text-slate-500

  beschreibung:
    type: string
    text: Beschreibung
    beschreibung: Freitext für Erläuterungen, Bedingungen oder interne Hinweise zu diesem Preis.
    page:
      steuerelement: textarea
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: true
      sortierbar: false
      listSection: secondary
      listPos: 20
      listValueClasses: text-sm text-slate-500


  betrag:
    type: string
    text: Betrag
    beschreibung: Geldbetrag des Preises. Bitte als Zahl mit optionalem Dezimaltrennzeichen eintragen.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'off'
      listPos: 340
      listValueClasses: text-sm text-slate-500

  zuZahlen:
    type: string
    text: Zu Zahlen
    beschreibung: Betrag, der tatsächlich zu zahlen ist, falls er vom Grundbetrag abweicht.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'off'
      listPos: 360
      listValueClasses: text-sm text-slate-500

  sonderPreis:
    type: string
    text: Sonder Preis
    beschreibung: Individueller Sonderpreis oder abweichender Betrag für besondere Fälle.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'off'
      listPos: 370
      listValueClasses: text-sm text-slate-500

  monat:
    type: string
    text: Monat
    beschreibung: Monat, auf den sich dieser Preis- oder Zahlungswert bezieht.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'off'
      listPos: 350
      listValueClasses: text-sm text-slate-500

  zuzahlen:
    type: string
    text: Zu Zahlen
    beschreibung: Betrag, der tatsächlich zu zahlen ist, falls er vom Grundbetrag abweicht.
    page:
      steuerelement: input
      formular: true
      horizont: 1
      gesperrt: false
    liste:
      suchbar: false
      sortierbar: true
      listSection: 'off'
      listPos: 370
      listValueClasses: text-sm text-slate-500
